<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>🪁 Kite Surfing Wind Forecast</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; color: #2c3e50; }
    .header { background: linear-gradient(135deg, #0077cc, #00b4d8); padding: 20px 24px; border-radius: 10px; margin-bottom: 20px; }
    .header h1 { color: white; margin: 0; font-size: 22px; }
    .header p { color: #d6eaf8; margin: 6px 0 0; font-size: 13px; }
    table { border-collapse: collapse; width: 100%; margin: 6px 0 16px; font-size: 13px; }
    th { background: #2980b9; color: white; padding: 6px 12px; }
    td { padding: 5px 12px; }
    .legend { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px; padding: 10px 14px; margin-bottom: 20px; font-size: 12px; color: #555; line-height: 1.9; }
    .spot-header { color: #2c3e50; border-left: 4px solid #2980b9; padding-left: 10px; margin-bottom: 10px; }
    .spot-block { margin-bottom: 28px; }
    .day-block { margin-bottom: 12px; }
    .day-label { margin: 8px 0 4px; }
    .badge-good { background: #27ae60; color: white; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    .badge-none { background: #bdc3c7; color: #555; padding: 2px 9px; border-radius: 12px; font-size: 11px; }
    .summary-table td, .summary-table th { text-align: center; }
    .summary-table td:first-child { text-align: left; font-weight: bold; }
    .cell-good { background: #f0fdf4; color: #15803d; font-weight: bold; }
    .loading { text-align: center; padding: 40px; color: #999; font-size: 16px; }
    .footer { color: #bdc3c7; font-size: 11px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px; }
  </style>
</head>
<body>
  <div id="app"><div class="loading">Loading forecast data…</div></div>

  <script>
  const SPOTS = [
    { name: "Miura Beach", lat: 35.136, lon: 139.617, beachFacing: 190 },
    { name: "Futtsu Cape", lat: 35.302, lon: 139.822, beachFacing: 270 },
    { name: "Numazu",      lat: 35.070, lon: 138.870, beachFacing: 185 },
  ];

  const WIND_MIN = 12, WIND_MAX = 25, GUST_SPREAD_MAX = 12;
  const HOUR_START = 9, HOUR_END = 18;
  const DISPLAY_HOUR_START = 8, DISPLAY_HOUR_END = 20;
  const MIN_CONSEC = 3;

  const HEAVY_CODES = new Set([55, 63, 65, 73, 75, 82, 95, 96, 99]);

  const WEATHER = {
    0:"☀️ Clear",1:"🌤 Mostly clear",2:"⛅ Partly cloudy",3:"☁️ Overcast",
    45:"🌫 Fog",48:"🌫 Icy fog",51:"🌦 Light drizzle",53:"🌧 Drizzle",55:"🌧 Heavy drizzle",
    61:"🌦 Light rain",63:"🌧 Rain",65:"🌧 Heavy rain",71:"🌨 Light snow",73:"❄️ Snow",
    75:"❄️ Heavy snow",80:"🌦 Showers",81:"🌧 Rain showers",82:"⛈ Heavy showers",
    95:"⛈ Thunderstorm",96:"⛈ Thunderstorm w/ hail",99:"⛈ Heavy thunderstorm"
  };

  const DIR_STYLE = {
    "Sideshore":    { color: "#27ae60", icon: "✅" },
    "Side-onshore": { color: "#27ae60", icon: "✅" },
    "Onshore":      { color: "#5d8aa8", icon: "↓" },
    "Side-off":     { color: "#e67e22", icon: "⚡" },
    "Offshore":     { color: "#e74c3c", icon: "🚫" },
  };

  function windColor(kn) {
    if (kn == null) return "#999";
    if (kn < 12)  return "#999";
    if (kn <= 19) return "#27ae60";
    if (kn <= 28) return "#f59e0b";
    return "#ef4444";
  }

  function kiteDir(deg, facing) {
    if (deg == null) return { label: "—", color: "#999", icon: "" };
    const diff = ((deg - facing) + 360) % 360;
    let key;
    if (diff < 22.5 || diff >= 337.5)              key = "Onshore";
    else if ((diff < 67.5) || (diff >= 292.5))     key = "Side-onshore";
    else if ((diff < 112.5) || (diff >= 247.5))    key = "Sideshore";
    else if ((diff < 157.5) || (diff >= 202.5))    key = "Side-off";
    else                                            key = "Offshore";
    return { label: key, ...DIR_STYLE[key] };
  }

  function isValid(speed, gust, code) {
    if (speed == null || gust == null) return false;
    if (speed < WIND_MIN || speed > WIND_MAX) return false;
    if (gust > speed + GUST_SPREAD_MAX) return false;
    if (HEAVY_CODES.has(code)) return false;
    return true;
  }

  function hasConsec(times) {
    if (times.length < MIN_CONSEC) return false;
    const hours = times.map(t => parseInt(t.slice(11, 13)));
    let run = 1;
    for (let i = 1; i < hours.length; i++) {
      run = hours[i] === hours[i-1] + 1 ? run + 1 : 1;
      if (run >= MIN_CONSEC) return true;
    }
    return false;
  }

  function windowTimes(times) {
    if (times.length < MIN_CONSEC) return new Set();
    const hours = times.map(t => parseInt(t.slice(11, 13)));
    const inWin = new Array(times.length).fill(false);
    let rs = 0;
    for (let i = 1; i <= hours.length; i++) {
      if (i === hours.length || hours[i] !== hours[i-1] + 1) {
        if (i - rs >= MIN_CONSEC) for (let j = rs; j < i; j++) inWin[j] = true;
        rs = i;
      }
    }
    return new Set(times.filter((_, i) => inWin[i]));
  }

  function windowRange(times) {
    if (times.length < MIN_CONSEC) return null;
    const hours = times.map(t => parseInt(t.slice(11, 13)));
    let rs = 0;
    for (let i = 1; i <= hours.length; i++) {
      if (i === hours.length || hours[i] !== hours[i-1] + 1) {
        const count = i - rs;
        if (count >= MIN_CONSEC) {
          const endH = hours[i-1] + 1;
          return { start: times[rs].slice(11, 16), end: `${String(endH).padStart(2,'0')}:00`, count };
        }
        rs = i;
      }
    }
    return null;
  }

  function getDates() {
    const now = new Date();
    const jst = new Date(now.getTime() + 9 * 3600000);
    const dates = [];
    for (let i = 1; i <= 3; i++) {
      const d = new Date(jst.getTime() + i * 86400000);
      dates.push(d.toISOString().slice(0, 10));
    }
    return dates;
  }

  function weekday(dateStr) {
    return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(dateStr + "T00:00:00").getDay()];
  }

  async function fetchSpot(spot) {
    const params = new URLSearchParams({
      latitude: spot.lat, longitude: spot.lon,
      hourly: "wind_speed_10m,wind_gusts_10m,wind_direction_10m,weather_code",
      wind_speed_unit: "kn", timezone: "Asia/Tokyo", forecast_days: 4
    });
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
    return res.json();
  }

  function buildSummaryTable(spotDays, dates) {
    const headers = dates.map(d => `<th style="padding:8px 14px;">${d.slice(5).replace('-','/')} <span style="font-weight:normal;font-size:11px;">${weekday(d)}</span></th>`).join('');
    const rows = spotDays.map(({ spot, days }) => {
      const cells = days.map(day => {
        if (day.valid && day.range) {
          return `<td class="cell-good" style="padding:8px 12px;">✅ ${day.range.start}–${day.range.end} (${day.range.count}h)</td>`;
        }
        return `<td style="padding:8px 12px;color:#bdc3c7;">—</td>`;
      }).join('');
      return `<tr><td style="padding:8px 12px;font-weight:bold;">${spot.name}</td>${cells}</tr>`;
    }).join('');
    return `<table class="summary-table" style="border-collapse:collapse;width:100%;margin-bottom:24px;font-size:13px;">
      <thead><tr style="background:#2c3e50;color:white;"><th style="padding:8px 12px;text-align:left;">Spot</th>${headers}</tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function buildDetailRow(t, s, g, d, c, inRiding, isMatch, inWindow, beachFacing) {
    const bg = inWindow ? "#bbf7d0" : isMatch ? "#dbeafe" : inRiding ? "#ffffff" : "#f5f5f5";
    const dir = kiteDir(d, beachFacing);
    const dirStyle = inRiding ? `color:${dir.color};font-weight:bold` : "color:#aaa";
    const weather = WEATHER[c] || `Code ${c}`;
    const weatherStr = inRiding ? weather : `<span style="color:#bbb">${weather}</span>`;
    const timeStyle = inRiding ? "" : "color:#999";
    return `<tr style="background:${bg}">
      <td style="padding:5px 12px;text-align:center;${timeStyle}">${t.slice(11,16)}</td>
      <td style="padding:5px 12px;text-align:center;font-weight:bold;color:${windColor(s)}">${s != null ? Math.round(s) : '—'}</td>
      <td style="padding:5px 12px;text-align:center;font-weight:bold;color:${windColor(g)}">${g != null ? Math.round(g) : '—'}</td>
      <td style="padding:5px 12px;text-align:center;${dirStyle}">${dir.icon} ${dir.label}</td>
      <td style="padding:5px 12px;font-size:12px">${weatherStr}</td>
    </tr>`;
  }

  function buildDayBlock(date, displayRows, goodTimes, winTimes, dayValid, beachFacing) {
    const label = `${date.slice(5).replace('-','/')} (${weekday(date)})`;
    const badge = dayValid
      ? `<span class="badge-good">✓ Good to kite</span>`
      : `<span class="badge-none">No suitable window</span>`;
    if (!dayValid) return `<div class="day-block"><h4 class="day-label">${label} ${badge}</h4></div>`;
    const rows = displayRows.map(([t, s, g, d, c]) => {
      const h = parseInt(t.slice(11,13));
      const inRiding = h >= HOUR_START && h < HOUR_END;
      return buildDetailRow(t, s, g, d, c, inRiding, goodTimes.has(t), winTimes.has(t), beachFacing);
    }).join('');
    return `<div class="day-block">
      <h4 class="day-label">${label} ${badge}</h4>
      <table><thead><tr style="background:#2980b9;color:white;font-size:12px;">
        <th style="padding:6px 12px">Time</th><th style="padding:6px 12px">Wind (kn)</th>
        <th style="padding:6px 12px">Gust (kn)</th><th style="padding:6px 12px">Direction</th>
        <th style="padding:6px 12px">Weather</th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }

  async function render() {
    const dates = getDates();
    const now = new Date();
    const jst = new Date(now.getTime() + 9 * 3600000);
    const updatedStr = jst.toISOString().slice(0, 16).replace('T', ' ') + ' JST';

    let spotDays = [];
    for (const spot of SPOTS) {
      const data = await fetchSpot(spot);
      const times = data.hourly.time;
      const speeds = data.hourly.wind_speed_10m;
      const gusts  = data.hourly.wind_gusts_10m;
      const dirs   = data.hourly.wind_direction_10m;
      const codes  = data.hourly.weather_code;

      const days = dates.map(date => {
        const displayRows = times.reduce((acc, t, i) => {
          const h = parseInt(t.slice(11,13));
          if (t.startsWith(date) && h >= DISPLAY_HOUR_START && h < DISPLAY_HOUR_END)
            acc.push([t, speeds[i], gusts[i], dirs[i], codes[i]]);
          return acc;
        }, []);
        const goodTimes = displayRows
          .filter(([t,,s,g,,c]) => {
            const h = parseInt(t.slice(11,13));
            return h >= HOUR_START && h < HOUR_END && isValid(speeds[times.indexOf(t)], gusts[times.indexOf(t)], codes[times.indexOf(t)]);
          })
          .map(([t]) => t);

        // rebuild goodTimes properly
        const goodTimesArr = [];
        for (let i = 0; i < times.length; i++) {
          const t = times[i]; const h = parseInt(t.slice(11,13));
          if (t.startsWith(date) && h >= HOUR_START && h < HOUR_END && isValid(speeds[i], gusts[i], codes[i]))
            goodTimesArr.push(t);
        }
        const dayValid = hasConsec(goodTimesArr);
        const winTimesSet = dayValid ? windowTimes(goodTimesArr) : new Set();
        const range = dayValid ? windowRange(goodTimesArr) : null;
        return { date, displayRows, goodTimes: new Set(goodTimesArr), winTimes: winTimesSet, valid: dayValid, range };
      });

      spotDays.push({ spot, days });
    }

    const legend = `<div class="legend">
      <strong>Row highlight:</strong>
      <span style="background:#bbf7d0;padding:1px 7px;border-radius:4px;margin:0 3px;">3h+ window</span>
      <span style="background:#dbeafe;padding:1px 7px;border-radius:4px;margin:0 3px;">Matching hour</span>
      &nbsp;|&nbsp; <strong>Direction:</strong>
      ✅ Sideshore &nbsp; ✅ Side-onshore &nbsp; ↓ Onshore &nbsp; ⚡ Side-off &nbsp; 🚫 Offshore<br>
      <strong>Wind / Gust color:</strong>
      <span style="color:#999">■ &lt;12 kn</span> &nbsp;
      <span style="color:#27ae60">■ 12–19 kn</span> &nbsp;
      <span style="color:#f59e0b">■ 20–28 kn</span> &nbsp;
      <span style="color:#ef4444">■ 29+ kn</span>
    </div>`;

    const summary = buildSummaryTable(spotDays, dates);

    const details = spotDays.map(({ spot, days }) => {
      const dayBlocks = days.map(day =>
        buildDayBlock(day.date, day.displayRows, day.goodTimes, day.winTimes, day.valid, spot.beachFacing)
      ).join('');
      return `<div class="spot-block"><h3 class="spot-header">📍 ${spot.name}</h3>${dayBlocks}</div>`;
    }).join('');

    document.getElementById('app').innerHTML = `
      <div class="header">
        <h1>🪁 Kite Surfing Wind Forecast</h1>
        <p>
          Forecast: ${dates[0]} – ${dates[2]}<br>
          Riding window: 09:00–18:00 &nbsp;|&nbsp; Wind: ${WIND_MIN}–${WIND_MAX} kn &nbsp;|&nbsp;
          Max gust: base +${GUST_SPREAD_MAX} kn &nbsp;|&nbsp; Min window: ${MIN_CONSEC} hrs<br>
          <span style="font-size:11px;opacity:0.8">Last updated: ${updatedStr}</span>
        </p>
      </div>
      ${summary}${legend}${details}
      <p class="footer">Data: <a href="https://open-meteo.com" style="color:#bdc3c7">Open-Meteo</a></p>
    `;
  }

  render().catch(err => {
    document.getElementById('app').innerHTML = `<p style="color:red">Failed to load forecast: ${err.message}</p>`;
  });
  </script>
</body>
</html>
